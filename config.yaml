app:
  name: PicNest
  version: 1.1.0
  debug: false
  secret_key: IRwIKNkNPeVxdEWmHn4nM2wLLx1q81Kia19sbgrem6w
  base_url: http://localhost:8080
database:
  type: sqlite
  path: ./data/picnest.db
storage:
  upload_path: ./data/images
  db_path: ./data/picnest.db
  max_file_size: 104857600
  max_batch_size: 500
  allowed_extensions:
  - .jpg
  - .jpeg
  - .png
  - .gif
  - .webp
  - .avif
  - .svg
  - .bmp
  - .tiff
thumbnail:
  enabled: true
  quality: 85
  sizes:
    small: 150
    medium: 300
    large: 600
watermark:
  enabled: false
  text: PicNest
  font_size: 24
  position: bottom-right
  opacity: 0.5
  color: '#FFFFFF'
user:
  default_quota: 1099511627776
  max_quota: 1127426918400
  registration_enabled: true
  default_role: user
trash:
  retention_days: 30
  auto_cleanup: true
security:
  password_min_length: 6
  token_expire_hours: 168
  max_login_attempts: 5
  lockout_minutes: 30
