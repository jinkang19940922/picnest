version: '3.8'

services:
  # ── 后端 API 服务 ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: picnest-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data/images:/app/data/images
      - ./config.yaml:/app/config.yaml:ro
      - picnest-db:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PICNEST_CONFIG=/app/config.yaml
      - LOG_LEVEL=info
    networks:
      - picnest-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── 前端 Web UI ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: picnest-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - picnest-net

  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: picnest-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/images:/data/images:ro
    depends_on:
      - backend
      - frontend
    networks:
      - picnest-net

volumes:
  picnest-db:

networks:
  picnest-net:
    driver: bridge